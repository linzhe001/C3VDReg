dataset:
  type: c3vd
  data_root: /mnt/f/Datasets/C3VD_sever_datasets
  num_points: 1024
  split: test
  kwargs:
    scene_split: true
    random_seed: 42
    pair_mode: one_to_one
    use_voxel_sampling: true
    train_scenes:
      - cecum_t2_a
      - cecum_t2_b
      - cecum_t2_c
      - cecum_t4_a
      - cecum_t4_b
      - desc_t4_a
      - sigmoid_t1_a
      - sigmoid_t2_a
      - trans_t1_b
      - trans_t2_a
      - trans_t2_c
      - trans_t3_a
      - trans_t3_b
    test_scenes:
      - cecum_t1_a
      - cecum_t3_a
      - sigmoid_t3_b
      - trans_t1_a
      - trans_t2_b
      - trans_t4_a

algorithm:
  name: pointnetlk
  model_path: /home/linzhe/PCLR_compare/experiments/checkpoints/c3vd_pointnetlk/c3vd_pointnetlk_model_model_best.pth
  config:
    dim_k: 1024
    use_tnet: true
    max_iter: 20
    delta: 1.0e-2
    symfn: max
    transfer_from: /home/linzhe/PCLR_compare/experiments/checkpoints/c3vd_pointnetlk/c3vd_pointnetlk_classifier_feat_best.pth
    normalize_mode: joint

perturbation:
  path: /home/linzhe/PCLR_compare/src/unified_testing/test_results/perturbations
  random_seed: 42
  angle_filter: [0]

output:
  dir: /home/linzhe/PCLR_compare/src/unified_testing/test_results/wf5_smoke/pointnetlk_c3vd
  save_predictions: true
  save_summary: true

device: cpu
max_perturbations: 5
