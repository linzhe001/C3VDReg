benchmark:
  name: c3vd_raycasting_v1
  split: train
  subset_name: null
  point_unit: mm_like
  official_track: main

data:
  manifest_path: manifests/c3vd_raycasting_v1.jsonl
  subset_config_path: configs/subset_config.json
  dataset_root: /mnt/f/Datasets/C3VD_sever_datasets

preprocess:
  profile: canonical_v1
  seed: 42
  sampling_override: null
  num_points_override: 8192

model:
  id: dcp
  checkpoint_path: null
  overrides:
    normalize_mode: unit_cube
    emb_nn: dgcnn
    pointer: transformer
    head: svd
    emb_dims: 512
    n_blocks: 1
    n_heads: 4
    ff_dims: 1024
    dropout: 0.0
    cycle: false

perturbation:
  enabled: true
  rotation_deg: 90.0
  translation_m: 500.0
  min_rotation_deg: 0.0
  min_translation_m: 0.0
  noise_sigma: 0.0
  noise_clip: 0.0
  apply_noise_to: source

runtime:
  device: cuda:0
  batch_size: 1
  num_workers: 4
  export_html: false
  output_dir: outputs/benchmark/r90_t500mm_0_200epoch/dcp/train
  train_mode: full
  train_metadata_path: null
  dataset_overrides: {}
  training_overrides:
    num_epochs: 200
    batch_size: 48
    test_batch_size: 32
    lr: 0.001
    lr_decay_epochs: [100, 150]
    lr_decay_rate: 0.5
    save_interval: 10
    val_interval: 1
