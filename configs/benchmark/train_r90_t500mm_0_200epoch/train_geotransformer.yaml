benchmark:
  name: c3vd_raycasting_v1
  split: train
  subset_name: null
  point_unit: mm_like
  official_track: main

data:
  manifest_path: manifests/c3vd_raycasting_v1.jsonl
  subset_config_path: configs/subset_config.json
  dataset_root: /mnt/f/Datasets/C3VD_sever_datasets

preprocess:
  profile: canonical_v1
  seed: 42
  sampling_override: null
  num_points_override: 8192

model:
  id: geotransformer
  checkpoint_path: null
  overrides:
    normalize_mode: none
    experiment_name: geotransformer.3dmatch.stage4.gse.k3.max.oacl.stage2.sinkhorn
    neighbor_limits: [38, 36, 36, 38]
    spatial_scale: 100.0
    num_points_in_patch: 4

perturbation:
  enabled: true
  rotation_deg: 90.0
  translation_m: 500.0
  min_rotation_deg: 0.0
  min_translation_m: 0.0
  noise_sigma: 0.0
  noise_clip: 0.0
  apply_noise_to: source

runtime:
  device: cuda:0
  batch_size: 1
  num_workers: 4
  export_html: false
  output_dir: outputs/benchmark/r90_t500mm_0_200epoch/geotransformer/train
  train_mode: full
  train_metadata_path: null
  dataset_overrides: {}
  training_overrides:
    max_epochs: 200
    batch_size: 1
    lr: 0.0001
    lr_decay: 0.95
    lr_decay_steps: 1
    save_interval: 5
    validate_every: 1
