benchmark:
  name: c3vd_raycasting_v1
  split: train
  subset_name: null
  point_unit: mm_like
  official_track: main

data:
  manifest_path: manifests/c3vd_raycasting_v1.jsonl
  subset_config_path: configs/subset_config.json
  dataset_root: /mnt/f/Datasets/C3VD_sever_datasets

preprocess:
  profile: canonical_v1
  seed: 42
  sampling_override: null
  num_points_override: 8192

model:
  id: mamba3d_mamba2_direct
  checkpoint_path: null
  overrides:
    normalize_mode: unit_cube
    model_type: mamba3d_mamba2_direct
    dim_k: 1024
    symfn: max
    lk_mode: cached_reuse_order
    lm_damping: 0.001
    dx_clip_norm: 0.25
    max_iter: 10
    delta: 0.01
    learn_delta: false
    xtol: 1.0e-7
    p0_zero_mean: true
    p1_zero_mean: true
    d_model: 128
    depth: 2
    d_state: 16
    d_conv: 4
    expand: 1
    headdim: 64
    ngroups: 1
    chunk_size: 128
    rmsnorm: true
    drop_path_rate: 0.0
    drop_out: 0.0
    layer_scale_init: 1.0e-4
    stem_hidden_dim: 64
    pos_hidden_dim: 64
    ffn_ratio: 2.0
    mlp_hidden_dim: 256
    mlp_norm: layernorm
    pooling: maxavg
    descriptor_norm: layernorm
    point_order: sort_xyz

perturbation:
  enabled: true
  rotation_deg: 90.0
  translation_m: 500.0
  min_rotation_deg: 0.0
  min_translation_m: 0.0
  noise_sigma: 0.0
  noise_clip: 0.0
  apply_noise_to: source

runtime:
  device: cuda:0
  batch_size: 1
  num_workers: 4
  export_html: false
  output_dir: outputs/benchmark/r90_t500mm_0_200epoch/mamba2_direct/train
  train_mode: full
  train_metadata_path: null
  dataset_overrides: {}
  training_overrides:
    epochs: 200
    batch_size: 16
    lr: 0.000001
    min_lr: 1.0e-8
    max_skipped_batches: 100
