benchmark:
  name: c3vd_raycasting_v1
  split: train
  subset_name: null
  point_unit: mm_like
  official_track: main

data:
  manifest_path: manifests/c3vd_raycasting_v1.jsonl
  subset_config_path: configs/subset_config.json
  dataset_root: /mnt/f/Datasets/C3VD_sever_datasets

preprocess:
  profile: canonical_v1
  seed: 42
  sampling_override: null
  num_points_override: 8192

model:
  id: regtr
  checkpoint_path: null
  overrides:
    normalize_mode: none
    d_embed: 256
    nhead: 8
    d_feedforward: 1024
    num_encoder_layers: 6
    first_subsampling_dl: 2.5
    overlap_radius: 3.75
    r_p: 20.0
    r_n: 40.0
    reg_success_thresh_trans: 10.0

perturbation:
  enabled: true
  rotation_deg: 90.0
  translation_m: 500.0
  min_rotation_deg: 0.0
  min_translation_m: 0.0
  noise_sigma: 0.0
  noise_clip: 0.0
  apply_noise_to: source

runtime:
  device: cuda:0
  batch_size: 1
  num_workers: 4
  export_html: false
  output_dir: outputs/benchmark/r90_t500mm_0_200epoch/regtr/train
  train_mode: full
  train_metadata_path: null
  dataset_overrides: {}
  training_overrides:
    niter: -200
    train_batch_size: 2
    val_batch_size: 2
    test_batch_size: 1
    base_lr: 0.0001
    validate_every: 1
    nb_sanity_val_steps: 1
