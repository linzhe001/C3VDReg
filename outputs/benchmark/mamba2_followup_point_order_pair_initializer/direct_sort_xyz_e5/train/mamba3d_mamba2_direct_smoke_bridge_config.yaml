dataset:
  num_points: 8192
  train_ratio: 0.7
  random_seed: 42
  normalize_mode: unit_cube
  sampling_mode: voxel
  max_train_pairs: null
  max_val_pairs: null
  data_root: /mnt/f/Datasets/C3VD_sever_datasets
  train_scenes:
  - cecum_t2_a
  - cecum_t2_b
  - cecum_t2_c
  - cecum_t4_a
  - cecum_t4_b
  - desc_t4_a
  - sigmoid_t1_a
  - sigmoid_t2_a
  - trans_t1_b
  - trans_t2_a
  - trans_t2_c
  - trans_t3_a
  - trans_t3_b
  val_scenes:
  - cecum_t1_b
  - sigmoid_t3_a
  - trans_t4_b
  test_scenes:
  - cecum_t1_a
  - cecum_t3_a
  - sigmoid_t3_b
  - trans_t1_a
  - trans_t2_b
  - trans_t4_a
  perturbation_enabled: true
  rotation_deg: 90.0
  translation_m: 500.0
  noise_sigma: 0.0
  noise_clip: 0.0
  apply_noise_to: source
  frame_stride: 1
  max_test_pairs: null
model:
  model_type: mamba3d_mamba2_direct
  dim_k: 1024
  symfn: max
  max_iter: 3
  delta: 0.01
  learn_delta: false
  lk_mode: cached_reuse_order
  lm_damping: 0.001
  dx_clip_norm: 0.25
  xtol: 1.0e-07
  p0_zero_mean: true
  p1_zero_mean: true
  d_model: 128
  depth: 2
  d_state: 16
  d_conv: 4
  expand: 1
  headdim: 64
  ngroups: 1
  chunk_size: 128
  rmsnorm: true
  drop_path_rate: 0.0
  drop_out: 0.0
  layer_scale_init: 0.0001
  stem_hidden_dim: 64
  pos_hidden_dim: 64
  ffn_ratio: 2.0
  mlp_hidden_dim: 256
  mlp_norm: layernorm
  pooling: maxavg
  descriptor_norm: layernorm
  point_order: sort_xyz
training:
  epochs: 5
  batch_size: 4
  lr: 5.0e-07
  weight_decay: 0.0
  optimizer: Adam
  num_workers: 0
  pointnet_tune: true
  rot_factor: 1.0
  trans_mag: 0.8
  loss_mode: pointnetlk
  grad_clip_norm: 1.0
  max_loss: 500.0
  eval_max_loss: 500.0
  max_skipped_batches: 500
  skip_nonfinite_loss: true
  abort_after_nonfinite_steps: 5
  log_grad_norm: true
  scheduler_factor: 0.5
  scheduler_patience: 5
  scheduler_threshold: 0.0001
  scheduler_threshold_mode: rel
  scheduler_cooldown: 0
  min_lr: 1.0e-08
  max_train_steps: null
  max_test_steps: null
  resume_from: /home/linzhe/PCLR_compare/outputs/benchmark/mamba3d_mamba2_direct_cached_lk_r90_t500_e50/run_full/train_bridge/mamba3d_pointlk_model_best.pth
output:
