benchmark:
  name: c3vd_raycasting_v1
  split: test
  subset_name: null
  point_unit: mm_like
  official_track: main
data:
  manifest_path: manifests/c3vd_raycasting_v1.jsonl
  subset_config_path: configs/subset_config.json
  dataset_root: /mnt/f/Datasets/C3VD_sever_datasets
preprocess:
  profile: canonical_v1
  seed: 42
  sampling_override: null
  num_points_override: 8192
model:
  id: mamba3d_mamba2_direct
  checkpoint_path: /home/linzhe/PCLR_compare/checkpoints/mamba3d_mamba2_direct/mamba3d_pointlk_model_best.pth
  overrides:
    normalize_mode: unit_cube
    model_type: mamba3d_mamba2_direct
    dim_k: 1024
    symfn: max
    lk_mode: cached_reuse_order
    lm_damping: 0.001
    dx_clip_norm: 0.25
    max_iter: 10
    delta: 0.01
    learn_delta: false
    xtol: 1.0e-07
    p0_zero_mean: true
    p1_zero_mean: true
    d_model: 128
    depth: 2
    d_state: 16
    d_conv: 4
    expand: 1
    headdim: 64
    ngroups: 1
    chunk_size: 128
    rmsnorm: true
    drop_path_rate: 0.0
    drop_out: 0.0
    layer_scale_init: 0.0001
    stem_hidden_dim: 64
    pos_hidden_dim: 64
    ffn_ratio: 2.0
    mlp_hidden_dim: 256
    mlp_norm: layernorm
    pooling: maxavg
    descriptor_norm: layernorm
    point_order: sort_xyz
perturbation:
  enabled: true
  rotation_deg: 90.0
  translation_m: 500.0
  noise_sigma: 0.0
  noise_clip: 0.0
  apply_noise_to: source
  min_rotation_deg: 25.0
  min_translation_m: 100.0
runtime:
  device: cuda:0
  batch_size: 1
  num_workers: 0
  export_html: false
  output_dir: outputs/benchmark/r25_90_t100_500mm_protocol/mamba2_direct/eval_test
  train_mode: smoke
  train_metadata_path: /home/linzhe/PCLR_compare/outputs/benchmark/mamba2_followup_point_order_pair_initializer/direct_sort_xyz_e5/train/run_metadata.json
  dataset_overrides: {}
  training_overrides: {}
analysis:
  required_tables:
  - leaderboard_main
  - leaderboard_multithreshold
  - bucket_overlap
  - bucket_rotation
  - bucket_scene
  - efficiency_summary
  - geometry_summary
  required_curves:
  - rr_multithreshold
  - success_latency_pareto
  bucket_keys:
  - overlap_bin
  - rotation_bin
  - translation_bin
  - scene_id
  - preprocess_profile_id
  - refinement_track
  geometry:
    sample_count: 2048
    distance_mode: visible_overlap_preferred
    export_histogram: false
    export_cdf: false
  qualitative:
    topk_failures: 20
    export_failure_gallery: false
  export:
    html: false
    png: false
    markdown_tables: true
