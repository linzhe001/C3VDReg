# C3VD RegTR Training Config
# Original file: /home/linzhe/PCLR_compare/outputs/benchmark/r90_t500mm_from_scratch_fixed_regtr_dcp/regtr/train/regtr_smoke_bridge_config.yaml

dataloader:
  num_workers: 4
  persistent_workers: true
  pin_memory: true
dataset:
  apply_noise_to: source
  augment_noise: 0.0
  data_root: /mnt/f/Datasets/C3VD_sever_datasets
  dataset: c3vd
  frame_stride: 1
  max_test_pairs: null
  max_train_pairs: null
  max_val_pairs: null
  noise_clip: 0.0
  noise_sigma: 0.0
  normalize_mode: none
  num_points: 8192
  overlap_radius: 3.75
  perturb_pose: null
  perturbation_enabled: true
  random_seed: 42
  rotation_deg: 90.0
  sampling_mode: voxel
  test_batch_size: 1
  test_scenes:
  - cecum_t1_a
  - cecum_t3_a
  - sigmoid_t3_b
  - trans_t1_a
  - trans_t2_b
  - trans_t4_a
  train_batch_size: 2
  train_ratio: 0.7
  train_scenes:
  - cecum_t2_a
  - cecum_t2_b
  - cecum_t2_c
  - cecum_t4_a
  - cecum_t4_b
  - desc_t4_a
  - sigmoid_t1_a
  - sigmoid_t2_a
  - trans_t1_b
  - trans_t2_a
  - trans_t2_c
  - trans_t3_a
  - trans_t3_b
  translation_m: 500.0
  val_batch_size: 2
  val_scenes:
  - cecum_t1_b
  - sigmoid_t3_a
  - trans_t4_b
device:
  cuda: true
  gpu_id: 0
general:
  expt_name: benchmark_full_regtr
kpconv_options:
  KP_extent: 2.0
  KP_influence: linear
  aggregation_mode: sum
  architecture:
  - simple
  - resnetb
  - resnetb_strided
  - resnetb
  - resnetb
  - resnetb_strided
  - resnetb
  - resnetb
  - resnetb_strided
  - resnetb
  - resnetb
  batch_norm_momentum: 0.02
  conv_radius: 2.5
  deform_radius: 5.0
  first_feats_dim: 128
  first_subsampling_dl: 2.5
  fixed_kernel_points: center
  in_feats_dim: 1
  in_points_dim: 3
  modulated: false
  neighborhood_limits:
  - 40
  - 40
  - 40
  - 40
  num_kernel_points: 15
  num_layers: 4
  overlap_radius: 3.75
  use_batch_norm: true
logging:
  checkpoint_dir: experiments/checkpoints/c3vd_regtr
  log_interval: 10
  save_interval: 5
  val_interval: 1
losses:
  corr_loss_on:
  - 5
  feature_loss_on:
  - 5
  feature_loss_type: infonce
  overlap_loss_on:
  - 5
  overlap_loss_pyr: 3
  r_n: 40.0
  r_p: 20.0
  wt_corr: 1.0
  wt_feature: 0.1
  wt_feature_un: 0.0
  wt_overlap: 1.0
model:
  attention_type: dot_prod
  ca_val_has_pos_emb: true
  corr_decoder_has_pos_emb: true
  d_embed: 256
  d_feedforward: 1024
  direct_regress_coor: true
  dropout: 0.0
  model: regtr.RegTR
  nhead: 8
  num_encoder_layers: 6
  pos_emb_type: sine
  pre_norm: true
  sa_val_has_pos_emb: true
  transformer_act: relu
  transformer_encoder_has_pos_emb: true
seed: 1234
solver:
  base_lr: 5.0e-05
  grad_clip: 0.1
  optimizer: AdamW
  scheduler: step
  scheduler_param:
  - 50000
  - 0.5
  weight_decay: 0.0001
train_options:
  niter: 148800
validation:
  reg_success_thresh_rot: 10
  reg_success_thresh_trans: 10.0
