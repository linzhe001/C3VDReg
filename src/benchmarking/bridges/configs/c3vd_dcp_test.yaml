# Configuration for TESTING DCP training on C3VD dataset (small-scale)

# Dataset configuration
dataset:
  name: c3vd
  data_root: /mnt/f/Datasets/C3VD_sever_datasets
  num_points: 8192
  train_ratio: 0.7
  random_seed: 42
  normalize_mode: unit_cube
  gaussian_noise: false
  rot_factor: 4.0  # Rotation range = ±45 degrees
  trans_mag: 0.5   # Translation range = ±0.5

# Model configuration (DCP-v2 by default)
model:
  name: dcp
  emb_nn: dgcnn      # Embedding network: dgcnn or pointnet
  pointer: transformer  # Pointer network: identity or transformer
  head: svd          # Head: svd
  emb_dims: 512      # Embedding dimension
  n_blocks: 1        # Number of attention blocks
  n_heads: 4         # Number of attention heads
  ff_dims: 1024      # Feed-forward dimension
  dropout: 0.0       # Dropout rate

# Training configuration - SMALL SCALE TEST
training:
  exp_name: c3vd_dcp_test
  batch_size: 32     # Increased for RTX 5090 (32GB VRAM)
  num_epochs: 5      # Small test run
  test_batch_size: 16

  # Optimizer
  optimizer: Adam
  lr: 0.001
  momentum: 0.9

  # Scheduler
  scheduler: step
  lr_decay_epochs: [3]
  lr_decay_rate: 0.5

  # Device
  use_cuda: true
  cuda_device: 0

  # Logging
  log_interval: 5    # Log every 5 batches
  val_interval: 1

  # Checkpoints
  save_interval: 2   # Save every 2 epochs
  checkpoint_dir: experiments/checkpoints/c3vd_dcp_test

  # Data loading
  num_workers: 4

  # Random seed
  seed: 1234

# Testing configuration
testing:
  pretrained: null
  batch_size: 16
  num_workers: 4
