# Smoke-first configuration for direct-point Mamba2 PointNetLK on C3VD.

dataset:
  num_points: 2048
  train_ratio: 0.7
  random_seed: 42
  normalize_mode: unit_cube
  sampling_mode: voxel
  max_train_pairs: 64
  max_val_pairs: 64

model:
  model_type: mamba3d_mamba2_direct
  dim_k: 1024
  symfn: max
  max_iter: 5
  delta: 1.0e-2
  learn_delta: false
  lk_mode: exact
  lm_damping: 1.0e-3
  dx_clip_norm: null
  xtol: 1.0e-7
  p0_zero_mean: true
  p1_zero_mean: true
  d_model: 128
  depth: 2
  d_state: 16
  d_conv: 4
  expand: 1
  headdim: 64
  ngroups: 1
  chunk_size: 128
  rmsnorm: true
  drop_path_rate: 0.0
  drop_out: 0.0
  layer_scale_init: 1.0e-4
  stem_hidden_dim: 64
  pos_hidden_dim: 64
  ffn_ratio: 2.0
  mlp_hidden_dim: 256
  mlp_norm: layernorm
  pooling: maxavg
  descriptor_norm: layernorm
  point_order: identity

training:
  epochs: 1
  batch_size: 16
  lr: 0.000001
  weight_decay: 0.0
  optimizer: Adam
  num_workers: 2
  pointnet_tune: true
  rot_factor: 1.0
  trans_mag: 0.8
  loss_mode: pointnetlk
  grad_clip_norm: 1.0
  max_loss: 200.0
  eval_max_loss: 200.0
  max_skipped_batches: 100
  skip_nonfinite_loss: true
  abort_after_nonfinite_steps: 5
  log_grad_norm: true
  scheduler_factor: 0.5
  scheduler_patience: 5
  scheduler_threshold: 1.0e-4
  scheduler_threshold_mode: rel
  scheduler_cooldown: 0
  min_lr: 1.0e-8
  max_train_steps: 5
  max_test_steps: 5

output:
  checkpoint_dir: experiments/checkpoints/c3vd_mamba3d_mamba2_direct_smoke
  log_dir: experiments/logs/c3vd_mamba3d_mamba2_direct_smoke

device: cuda:0
